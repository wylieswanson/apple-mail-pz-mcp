name: Create Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-rc*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between ## [VERSION] and next ## [ to a workspace
          # file. Writing to a file (vs a step output consumed by --notes)
          # avoids shell-interpolating CHANGELOG content — backticks in
          # markdown code spans like `update_message` would otherwise be
          # parsed as command substitution by bash on the next step. (#177)
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $VERSION" > release-notes.md
          fi

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Close milestone
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MILESTONE=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title == \"v$VERSION\" or .title == \"$VERSION\") | .number" 2>/dev/null || echo "")
          if [ -n "$MILESTONE" ]; then
            gh api -X PATCH repos/${{ github.repository }}/milestones/$MILESTONE -f state=closed
            echo "Closed milestone v$VERSION"
          else
            echo "No milestone found for v$VERSION"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # Publish to PyPI via OIDC trusted publishing (#335) — no API token.
  # Requires a PyPI trusted publisher registered for this repo with
  # workflow `release.yml` and environment `pypi`. Runs only on real
  # version tags (the `v*` / `!v*-rc*` filter above); RC tags go to
  # release-hygiene.yml and never publish.
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # mint the short-lived OIDC token for PyPI
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
