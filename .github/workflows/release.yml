name: Create Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-rc*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4

      # build-mcpb.sh smoke-tests the staged bundle with `uv run --directory`,
      # exactly as the host launches it, so uv must be on the runner.
      - uses: astral-sh/setup-uv@v7
        with:
          node-version: '20'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between ## [VERSION] and next ## [ to a workspace
          # file. Writing to a file (vs a step output consumed by --notes)
          # avoids shell-interpolating CHANGELOG content — backticks in
          # markdown code spans like `update_message` would otherwise be
          # parsed as command substitution by bash on the next step. (#177)
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $VERSION" > release-notes.md
          fi

      # Idempotent: re-running this workflow (e.g. after an unrelated job fails)
      # must not blow up with "Release.tag_name already exists".
      - name: Create or update GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME exists; updating notes."
            gh release edit "$GITHUB_REF_NAME" \
              --title "Release $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Release $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # Build the Claude Desktop .mcpb bundle (uv-type; no compiled artifacts to
      # bundle, so it builds fine on Linux) and attach it to the release (#332).
      - name: Build and attach .mcpb bundle
        run: |
          ./scripts/build-mcpb.sh
          gh release upload "$GITHUB_REF_NAME" dist/*.mcpb --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Close milestone
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MILESTONE=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title == \"v$VERSION\" or .title == \"$VERSION\") | .number" 2>/dev/null || echo "")
          if [ -n "$MILESTONE" ]; then
            gh api -X PATCH repos/${{ github.repository }}/milestones/$MILESTONE -f state=closed
            echo "Closed milestone v$VERSION"
          else
            echo "No milestone found for v$VERSION"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
